schema_version = "1.0.0"

[init]
specs = true
ci = true
diagram_style = "mermaid"
entrypoints = [
    "AGENTS.md",
    "CLAUDE.md",
    "GEMINI.md",
    "CODEX.md",
]

[repo]
product_name = "pincher"
product_summary = "Agent engine. The loop runner. It manages sessions, inference preparation, provider execution, custody, approvals, and runtime control. It ensures Decapod is consulted before inference and before mutation."
architecture_direction = "library"
product_type = "service_or_library"
done_criteria = "Done means Pincher provides a Rust-first agent engine that runs governed inference loops inside explicitly allowed repos, with Decapod consulted before context exposure, before agent execution, before repo mutation, and before completion is accepted. Pincher must manage agent/session lifecycle, provider invocation, repo/worktree custody, claimed todos, approval boundaries, context preparation, execution state, validation checkpoints, failure handling, and proof-backed handoff without owning the UI experience directly. A Pincher-managed run is complete only when the intent is bound to Decapod governance, the allowed scope is explicit, the agent operates through that boundary, required approvals are honored, validation has run, proof artifacts are recorded, and the final state can be rendered by Amnion as either ready, blocked, failed-with-cause, or safely handed off."
base_branch = "main"
primary_languages = ["Rust"]
detected_surfaces = [
    "cargo",
    "rust",
]
external_tracker = false
container_workspaces = true
mode = "local"
declared_capabilities = [
    "authentication",
    "background-processing",
    "event-driven",
    "external-integrations",
    "infrastructure-management",
    "persistent-state",
    "public-api",
]
