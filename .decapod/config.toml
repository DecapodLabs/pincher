schema_version = "1.0.0"

[init]
specs = true
ci = true
diagram_style = "mermaid"
entrypoints = [
    "AGENTS.md",
    "CLAUDE.md",
    "GEMINI.md",
    "CODEX.md",
]

[repo]
product_name = "pincher"
product_summary = "Pincher is the governed Rust loop engine. It requires Decapod custody and governed context before inference, emits a versioned host contract, and requires authoritative Decapod validation and proof before readiness."
architecture_direction = "Pincher is a Rust library/runtime. Amnion owns the soft terminal UI/UX; Pincher owns the governed inference and execution loop; Decapod owns authoritative repository custody, approvals, validation, proof, and promotion state."
product_type = "service_or_library"
done_criteria = "For governed-run contract v1, a host can construct a versioned RunRequest with explicit Decapod session, task, work-unit, repository, and isolated workspace references; the engine resolves authoritative custody and governed context before invoking a ProviderTurn; typed interlock, approval, failure, and event envelopes preserve the run outcome; and Ready is impossible without successful Decapod validation and proof evidence references. Amnion renders the resulting host contract, while Decapod remains the authority. Real providers, tools, patch application, transports, persistence, recovery, and promotion remain deferred until separately proven."
base_branch = "main"
primary_languages = ["Rust"]
detected_surfaces = [
    "cargo",
    "rust",
]
external_tracker = false
container_workspaces = true
mode = "local"
declared_capabilities = [
    "event-driven",
    "external-integrations",
    "public-api",
]
